<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{layout :: layout(~{::section})}">
<section>
    <form th:action="@{/keywords}" method="get" style="margin-bottom:2em;text-align:center;">
        <input type="text" name="q" th:value="${param.q}" placeholder="Query keyword..." style="width:300px;padding:0.5em;"/>
        <button type="submit" style="margin-left:1em;">Query</button>
    </form>
    <div style="text-align:center;">
        <ul th:if="${keywords != null}" style="list-style:none;padding:0;">
            <li th:each="word : ${keywords}" th:text="${word}" style="margin:0.5em 0;"></li>
        </ul>
    </div>
</section>
</body>
</html>
