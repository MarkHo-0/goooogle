<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{layout :: layout(~{::section})}">
<section>
    <form th:action="@{/search}" method="get" style="margin-bottom:2em;text-align:center;">
        <input type="text" name="q" th:value="${param.q}" placeholder="Search..." style="width:300px;padding:0.5em;"/>
        <button type="submit" style="margin-left:1em;">Search</button>
    </form>
    <div style="text-align:center;">
        <div th:if="${results != null}">
            <div th:if="${#lists.isEmpty(results)}">No results found.</div>
            <ul th:if="${!#lists.isEmpty(results)}" style="list-style:none;padding:0;">
                <li th:each="result : ${results}" th:text="${result}" style="margin:0.5em 0;"></li>
            </ul>
        </div>
    </div>
</section>
</body>
</html>
