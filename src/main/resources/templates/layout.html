<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle} ?: 'Goooogle'">Goooogle</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body th:fragment="layout(content)">
    <nav style="width:100%;padding:1em 0;background:#f0f0f0;text-align:center;">
        <a th:href="@{/home}" style="margin:0 1em;">Search</a>
        <a th:href="@{/spider}" style="margin:0 1em;">Spider</a>
        <a th:href="@{/keywords}" style="margin:0 1em;">Keywords</a>
    </nav>
    <main style="min-height:60vh;padding:2em 0;">
        <div th:replace="${content}"></div>
    </main>
    <footer style="width:100%;padding:1em 0;background:#f0f0f0;text-align:center;">
        &copy; This is Goooogle, not that Google.
    </footer>
</body>
</html>
