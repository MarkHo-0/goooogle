<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{layout :: layout(~{::section})}">
<section>
    <div style="text-align:center;margin-bottom:2em;">
        <h2 th:text="${pageTitle}">Indexer</h2>
        <p style="color:#666;margin-top:0.5em;" th:text="${stats}">Index Statistics</p>
    </div>
    <div th:if="${message}" style="background:#d4edda;border:1px solid #c3e6cb;border-radius:8px;padding:1em;margin-bottom:2em;color:#155724;text-align:center;">
        ✓ <span th:text="${message}">Indexing Complete</span>
    </div>
    <form th:action="@{/index}" method="post" style="max-width:400px;margin:0 auto;text-align:center;">
        <button type="submit" style="padding:0.75em 2em;font-size:1em;background:#667eea;color:white;border:none;border-radius:4px;cursor:pointer;">
            Start Indexing
        </button>
    </form>
    <div style="max-width:600px;margin:2em auto;padding:1.5em;background:#f8f9fa;border-left:4px solid #667eea;border-radius:4px;color:#555;line-height:1.6;font-size:0.95em;">
        <strong>What does the indexer do?</strong>
        <ul style="margin-left:20px;margin-top:1em;">
            <li style="margin:0.5em 0;">📄 Reads all cached HTML files from the spider</li>
            <li style="margin:0.5em 0;">🔤 Extracts words and their frequencies</li>
            <li style="margin:0.5em 0;">💾 Stores unique words in the database</li>
            <li style="margin:0.5em 0;">🔗 Creates word-page relationships for searching</li>
            <li style="margin:0.5em 0;">🗑️ Filters out common stop words</li>
        </ul>
    </div>
</section>
</body>
</html>
